<script>
    // 1. 初始化 Supabase (请替换成你自己的项目 URL 和 Anon Key)
    const SUPABASE_URL = 'https://syzkwpcepvmchjugoemd.supabase.co/rest/v1'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5emt3cGNlcHZtY2hqdWdvZW1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyODA3NzksImV4cCI6MjA5ODg1Njc3OX0.Hrdrf4V6FFOzwsbP_W_MDc3mfjP2k4BJuice2GL3Lqo'; 
    
    // 【核心修正】：使用 window.supabase 正确调用 CDN 引入的客户端，并重命名为 client 避免冲突
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 页面加载时自动拉取数据
    window.onload = async () => {
        fetchDishes();
    };

    // 2. 获取并渲染数据
    async function fetchDishes() {
        try {
            // 获取候选池（未入选周榜的所有菜，按票数倒序）
            const { data: candidates, error: err1 } = await supabaseClient.from('dishes').select('*').eq('in_weekly_pool', false).order('votes', { ascending: false });
            // 获取周榜（已入选的菜）
            const { data: weekly, error: err2 } = await supabaseClient.from('dishes').select('*').eq('in_weekly_pool', true);

            if (err1 || err2) {
                console.error("读取数据库失败，请检查Supabase权限(RLS)是否关闭:", err1 || err2);
                return;
            }

            // 渲染候选池
            const candidateUl = document.getElementById('candidateList');
            candidateUl.innerHTML = (candidates || []).map(d => `
                <li class="bg-white p-2 rounded shadow-sm flex justify-between items-center border border-gray-100">
                    <span>${d.name} <span class="text-gray-400 text-sm">(${d.price}元)</span></span>
                    <button onclick="voteDish(${d.id})" class="text-sm bg-gray-100 px-3 py-1 rounded-full hover:bg-indigo-100 transition">👍 ${d.votes}</button>
                </li>
            `).join('');

            // 渲染周榜（划掉已抽中的菜）
            const weeklyUl = document.getElementById('weeklyList');
            weeklyUl.innerHTML = (weekly || []).map(d => `
                <li class="p-2 rounded flex justify-between transition ${d.is_drawn ? 'line-through text-gray-400 bg-gray-200' : 'bg-green-50 text-green-800 font-medium'}">
                    <span>${d.name}</span>
                    <span class="text-sm">${d.is_drawn ? '👉 已吃' : '⏳ 待抽'}</span>
                </li>
            `).join('');
        } catch (e) {
            console.error("渲染失败:", e);
        }
    }

    // 3. 提交新菜品
    async function submitDish() {
        const name = document.getElementById('dishName').value.trim();
        const price = document.getElementById('dishPrice').value || 0;
        if(!name) return alert('菜名不能为空！');

        const { error } = await supabaseClient.from('dishes').insert([{ name, price }]);
        if(error) return alert('提交失败: ' + error.message);
        
        document.getElementById('dishName').value = '';
        document.getElementById('dishPrice').value = '';
        fetchDishes();
    }

    // 4. 投票（前端防刷票逻辑）
    async function voteDish(id) {
        let voted = JSON.parse(localStorage.getItem('voted_dishes') || '[]');
        if(voted.includes(id)) return alert('这道菜你已经投过票啦！');

        // 先查出当前票数
        const { data, error } = await supabaseClient.from('dishes').select('votes').eq('id', id).single();
        if(error) return alert('投票失败: ' + error.message);

        // 票数 +1
        await supabaseClient.from('dishes').update({ votes: data.votes + 1 }).eq('id', id);

        voted.push(id);
        localStorage.setItem('voted_dishes', JSON.stringify(voted));
        fetchDishes();
    }

    // 5. 随机抽取
    async function drawDish() {
        // 捞出本周菜单里 且 未被抽过 的菜
        const { data: pool } = await supabaseClient.from('dishes').select('*').eq('in_weekly_pool', true).eq('is_drawn', false);
        
        if(!pool || pool.length === 0) {
            return alert('本周候选菜单里没有可以抽的菜了！（请确保已有菜品入选了本周菜单且未被抽完）');
        }

        const resultDiv = document.getElementById('drawResult');
        let counter = 0;
        // 跑马灯随机动画效果
        const interval = setInterval(() => {
            resultDiv.innerText = pool[Math.floor(Math.random() * pool.length)].name;
            if(counter++ > 10) {
                clearInterval(interval);
                finalizeDraw(pool);
            }
        }, 100);
    }

    // 6. 确认抽中，写入数据库
    async function finalizeDraw(pool) {
        const finalDish = pool[Math.floor(Math.random() * pool.length)];
        document.getElementById('drawResult').innerText = `🎉 今天吃：${finalDish.name}！`;
        
        // 标记数据库为已抽中
        await supabaseClient.from('dishes').update({ is_drawn: true }).eq('id', finalDish.id);
        fetchDishes(); 
    }
</script>
