<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周菜单投票抽取系统</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    max-width: 820px;
    margin: 0 auto;
    padding: 24px 16px;
    background: linear-gradient(135deg, #f0f4ff 0%, #f8fafc 100%);
    min-height: 100vh;
    color: #1e293b;
    line-height: 1.5;
  }

  /* 通用卡片 */
  .card {
    background: #ffffff;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
    transition: all 0.3s ease;
    border: 1px solid rgba(0, 0, 0, 0.03);
  }
  .card:hover {
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
    transform: translateY(-1px);
  }

  h2 {
    margin-bottom: 18px;
    color: #1e293b;
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  h2::before {
    content: '';
    width: 4px;
    height: 18px;
    background: linear-gradient(180deg, #6366f1, #8b5cf6);
    border-radius: 2px;
  }
  h3 {
    margin: 0 0 14px;
    color: #334155;
    font-size: 16px;
    font-weight: 600;
  }

  /* 表单元素 */
  .form-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  input, select, textarea {
    padding: 10px 14px;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    background: #f8fafc;
    transition: all 0.2s ease;
    color: #1e293b;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #6366f1;
    background: #ffffff;
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
  }
  textarea {
    width: 100%;
    min-height: 140px;
    resize: vertical;
    line-height: 1.6;
  }

  /* 按钮 */
  button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
  }
  button:hover:not(:disabled) {
    transform: translateY(-1px);
    filter: brightness(1.05);
  }
  button:active:not(:disabled) {
    transform: translateY(0);
  }
  button:disabled {
    background: #e2e8f0 !important;
    color: #94a3b8 !important;
    cursor: not-allowed;
    transform: none !important;
  }

  .btn-primary {
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    color: white;
    box-shadow: 0 2px 8px rgba(99, 102, 241, 0.25);
  }
  .btn-success {
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    color: white;
    box-shadow: 0 2px 8px rgba(16, 185, 129, 0.25);
  }
  .btn-warning {
    background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    color: white;
    box-shadow: 0 2px 8px rgba(245, 158, 11, 0.25);
  }
  .btn-danger {
    background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    color: white;
    box-shadow: 0 2px 8px rgba(239, 68, 68, 0.25);
  }
  .btn-default {
    background: #f1f5f9;
    color: #475569;
  }
  .btn-default:hover:not(:disabled) {
    background: #e2e8f0;
  }
  .btn-small {
    padding: 6px 12px;
    font-size: 12px;
  }

  /* 菜品列表项 */
  .dish-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    border-bottom: 1px solid #f1f5f9;
    border-radius: 8px;
    transition: background 0.2s ease;
  }
  .dish-item:last-child { border-bottom: none; }
  .dish-item:hover {
    background: #f8fafc;
  }
  .dish-info { flex: 1; }
  .dish-name {
    font-weight: 500;
    color: #1e293b;
    font-size: 15px;
  }
  .dish-price {
    color: #64748b;
    margin-left: 12px;
    font-size: 13px;
  }
  .vote-count {
    color: #f59e0b;
    font-weight: 600;
    margin-right: 12px;
    font-size: 14px;
  }
  .del-btn {
    font-size: 12px;
    padding: 5px 10px;
    margin-left: 10px;
  }
  .meal-tag {
    display: inline-block;
    padding: 2px 8px;
    background: #e0e7ff;
    color: #4338ca;
    border-radius: 12px;
    font-size: 12px;
    margin-right: 10px;
  }

  /* 抽取结果 */
  .pick-result {
    text-align: center;
    padding: 28px 16px;
    font-size: 18px;
    font-weight: 600;
    background: linear-gradient(135deg, #eef2ff 0%, #faf5ff 100%);
    border-radius: 12px;
    color: #4338ca;
    margin-bottom: 16px;
    line-height: 1.6;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .pick-result .dish-name {
    font-size: 22px;
    margin: 8px 0;
  }
  .pick-result .manager {
    font-size: 13px;
    color: #6d28d9;
    font-weight: 500;
  }
  .pick-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .pick-col { text-align: center; }

  /* 标签页 */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    background: #ffffff;
    padding: 6px;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
  }
  .tab {
    flex: 1;
    padding: 12px 10px;
    text-align: center;
    background: transparent;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: #64748b;
    transition: all 0.2s ease;
  }
  .tab:hover {
    color: #475569;
    background: #f8fafc;
  }
  .tab.active {
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    color: white;
    box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
  }
  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 排名序号 */
  .rank-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    background: #f1f5f9;
    border-radius: 50%;
    margin-right: 10px;
    font-size: 12px;
    font-weight: 600;
    color: #64748b;
  }
  .rank-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: white; }
  .rank-2 { background: linear-gradient(135deg, #94a3b8, #64748b); color: white; }
  .rank-3 { background: linear-gradient(135deg, #fb923c, #ea580c); color: white; }

  .picked { opacity: 0.4; text-decoration: line-through; }

  /* 筛选栏 */
  .filter-bar {
    margin-bottom: 14px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    padding: 12px 14px;
    background: #f8fafc;
    border-radius: 10px;
  }
  .filter-bar input { width: 100px; background: white; }
  .tip {
    color: #94a3b8;
    font-size: 12px;
    margin-top: 8px;
    line-height: 1.6;
  }

  /* 登录页 */
  .login-box { max-width: 420px; margin: 80px auto; }
  .login-input { width: 100%; margin-bottom: 14px; }
  .login-box h2 { justify-content: center; }
  .login-box h2::before { display: none; }

  /* 顶部栏 */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding: 0 4px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .user-info {
    color: #475569;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* 管理页 */
  .admin-section {
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid #f1f5f9;
  }
  .admin-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .history-week {
    display: inline-block;
    padding: 8px 16px;
    margin: 6px;
    background: #f1f5f9;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: #475569;
    transition: all 0.2s ease;
  }
  .history-week:hover {
    background: #e2e8f0;
  }
  .history-week.active {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    box-shadow: 0 2px 8px rgba(99, 102, 241, 0.25);
  }

  /* 移动端适配 */
  @media (max-width: 600px) {
    body { padding: 16px 12px; }
    .card { padding: 18px; border-radius: 14px; }
    .tabs { flex-wrap: wrap; }
    .tab { flex: 1 1 30%; font-size: 13px; padding: 10px 8px; }
    .pick-grid { grid-template-columns: 1fr; gap: 16px; }
    .pick-result { min-height: auto; padding: 24px 16px; }
    .dish-item { flex-wrap: wrap; gap: 8px; }
    .dish-item > div:last-child { width: 100%; display: flex; justify-content: flex-end; }
  }
</style>
</head>
<body>

<!-- 登录页 -->
<div id="loginPage" class="login-box">
  <div class="card">
    <h2>登录 / 注册</h2>
    <input id="loginEmail" class="login-input" placeholder="邮箱地址">
    <input id="loginPass" class="login-input" type="password" placeholder="密码（至少6位）">
    <button class="btn-primary" style="width:100%;margin-bottom:12px" onclick="login()">登录</button>
    <button class="btn-default" style="width:100%" onclick="register()">注册新账号</button>
    <p class="tip" style="text-align:center;margin-top:12px">登录后即可投票和提交菜品</p>
  </div>
</div>

<!-- 主内容（登录后显示） -->
<div id="mainPage" style="display:none">
  <div class="top-bar">
    <span class="user-info" id="userInfo"></span>
    <div style="display:flex;gap:8px">
      <button class="btn-default btn-small" onclick="editNickname()">修改昵称</button>
      <button class="btn-default btn-small" onclick="logout()">退出登录</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-page="vote">投票区</div>
    <div class="tab" data-page="weekly">本周菜单</div>
    <div class="tab" data-page="pick">每日抽取</div>
    <div class="tab" data-page="admin" id="adminTab" style="display:none">管理</div>
  </div>

  <!-- 投票区 -->
  <div id="vote" class="page active">
    <div class="card">
      <h2>批量添加菜品</h2>
      <textarea id="batchInput" placeholder="每行一道菜，格式：菜名,价格
例如：
红烧肉,38
清炒白菜,12
番茄蛋汤,10
白米饭,2"></textarea>
      <div class="tip">相同菜名会全部保留，可重复提交</div>
      <div style="text-align:right; margin-top:12px">
        <button class="btn-primary" onclick="batchAddDishes()">批量提交</button>
      </div>
    </div>

    <div class="card">
      <h2>菜品列表 & 投票</h2>
      <div class="filter-bar">
        <span style="color:#475569;font-size:13px;font-weight:500">价格筛选：</span>
        <input id="minPrice" placeholder="最低价" type="number" oninput="loadDishes()">
        <span style="color:#94a3b8">—</span>
        <input id="maxPrice" placeholder="最高价" type="number" oninput="loadDishes()">
        <span style="color:#94a3b8; font-size:12px; margin-left:auto">登录后每道菜限投1票</span>
      </div>
      <div id="dishList"></div>
    </div>
  </div>

  <!-- 本周菜单 -->
  <div id="weekly" class="page">
    <div class="card">
      <h2>本周 Top 20 菜单</h2>
      <div id="weeklyList"></div>
    </div>
  </div>

  <!-- 每日抽取 -->
  <div id="pick" class="page">
    <div class="card">
      <h2>今日菜品抽取</h2>
      <div class="pick-grid">
        <!-- 午餐 -->
        <div class="pick-col">
          <h3>🍱 午餐</h3>
          <div id="lunchResult" class="pick-result">点击下方按钮抽取</div>
          <button class="btn-warning" onclick="randomPick('lunch')">抽取今日午餐</button>
        </div>
        <!-- 晚餐 -->
        <div class="pick-col">
          <h3>🍽️ 晚餐</h3>
          <div id="dinnerResult" class="pick-result">点击下方按钮抽取</div>
          <button class="btn-warning" onclick="randomPick('dinner')">抽取今日晚餐</button>
        </div>
      </div>
      <p style="text-align:center;color:#94a3b8;margin-top:16px;font-size:13px">每天固定两位不同负责人分别负责午晚餐；抽过的菜品自动排除，不会重复</p>
    </div>
    <div class="card">
      <h2>本周已抽取</h2>
      <div id="pickedList"></div>
    </div>
  </div>

  <!-- 管理页（仅管理员可见） -->
  <div id="admin" class="page">
    <div class="card">
      <div class="admin-section">
        <h3>本周管理</h3>
        <div class="form-row">
          <button class="btn-warning" onclick="resetWeeklyPicks()">重置本周抽取记录</button>
          <button class="btn-primary" onclick="generateWeekly()">重新生成本周 Top20</button>
          <button class="btn-danger" onclick="clearAllVotes()">清空所有投票数据</button>
        </div>
        <p class="tip">重置抽取：所有菜品恢复为未抽取状态，可重新抽取；清空投票不可恢复，请谨慎操作。</p>
      </div>

      <div class="admin-section">
        <h3>历史周记录</h3>
        <div id="historyWeeks"></div>
        <div id="historyDetail" style="margin-top:16px"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ====== 替换成你自己的 ======
const SUPABASE_URL = "https://syzkwpcepvmchjugoemd.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5emt3cGNlcHZtY2hqdWdvZW1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyODA3NzksImV4cCI6MjA5ODg1Njc3OX0.Hrdrf4V6FFOzwsbP_W_MDc3mfjP2k4BJuice2GL3Lqo";
// ===========================

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser = null;
let currentProfile = null;
let isAdmin = false;
const currentWeek = getWeekNumber(new Date());
const todayStr = new Date().toISOString().split('T')[0];

// 工具：显示用户名称，优先昵称
function displayName(user) {
  return user?.nickname || user?.email?.split('@')[0] || '未知用户';
}

// ========== 账号与个人信息 ==========
async function checkAuth() {
  const { data: { user } } = await supabase.auth.getUser();
  if(user) {
    currentUser = user;
    // 加载用户档案（昵称、角色）
    const { data: profile } = await supabase
      .from('profiles')
      .select('*')
      .eq('id', user.id)
      .single();
    currentProfile = profile;
    isAdmin = profile?.role === 'admin';

    document.getElementById('userInfo').textContent = '当前用户：' + displayName(profile);
    if(isAdmin) document.getElementById('adminTab').style.display = 'block';

    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainPage').style.display = 'block';
    loadDishes();
    loadHistoryWeeks();
    loadTodayManagers();
  } else {
    document.getElementById('loginPage').style.display = 'block';
    document.getElementById('mainPage').style.display = 'none';
  }
}

async function editNickname() {
  const newName = prompt('请输入你的昵称：', currentProfile?.nickname || '');
  if(!newName || !newName.trim()) return;
  
  const { error } = await supabase
    .from('profiles')
    .update({ nickname: newName.trim() })
    .eq('id', currentUser.id);
  
  if(error) return alert('修改失败：' + error.message);
  currentProfile.nickname = newName.trim();
  document.getElementById('userInfo').textContent = '当前用户：' + displayName(currentProfile);
  alert('昵称修改成功');
}

async function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  if(!email || !pass) return alert('请填写邮箱和密码');
  
  const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
  if(error) return alert('登录失败：' + error.message);
  checkAuth();
}

async function register() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  if(!email || pass.length < 6) return alert('密码至少6位');
  
  const { error } = await supabase.auth.signUp({ email, password: pass });
  if(error) return alert('注册失败：' + error.message);
  alert('注册成功，请登录');
}

async function logout() {
  await supabase.auth.signOut();
  currentUser = null;
  currentProfile = null;
  isAdmin = false;
  checkAuth();
}

// ========== 工具函数 ==========
function getWeekNumber(d) {
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  d.setUTCDate(d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7)));
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
}

// Tab切换
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.page).classList.add('active');
    if(tab.dataset.page === 'weekly') loadWeekly();
    if(tab.dataset.page === 'pick') loadPicked();
  };
});

// ========== 每日负责人逻辑 ==========
async function getTodayManagers() {
  // 先查今天有没有记录
  const { data } = await supabase
    .from('daily_managers')
    .select(`
      lunch_user:profiles!lunch_user_id(nickname, email),
      dinner_user:profiles!dinner_user_id(nickname, email)
    `)
    .eq('record_date', todayStr)
    .single();
  
  if(data) return data;

  // 没有则随机生成两位不同的用户
  const { data: allUsers } = await supabase
    .from('profiles')
    .select('id, nickname, email')
    .order('random()')
    .limit(2);
  
  if(!allUsers || allUsers.length < 2) return null;

  // 插入今日记录
  const { error } = await supabase
    .from('daily_managers')
    .insert({
      record_date: todayStr,
      lunch_user_id: allUsers[0].id,
      dinner_user_id: allUsers[1].id
    })
    .select(`
      lunch_user:profiles!lunch_user_id(nickname, email),
      dinner_user:profiles!dinner_user_id(nickname, email)
    `)
    .single();

  if(error) {
    // 并发冲突，再查一次
    const { data: retry } = await supabase
      .from('daily_managers')
      .select(`
        lunch_user:profiles!lunch_user_id(nickname, email),
        dinner_user:profiles!dinner_user_id(nickname, email)
      `)
      .eq('record_date', todayStr)
      .single();
    return retry;
  }
  return null;
}

async function loadTodayManagers() {
  // 预加载今日负责人，提前显示
  const managers = await getTodayManagers();
  if(managers) {
    const lunchEl = document.getElementById('lunchResult');
    const dinnerEl = document.getElementById('dinnerResult');
    if(lunchEl.innerText === '点击下方按钮抽取') {
      lunchEl.innerHTML = `<div class="manager">今日负责人：${displayName(managers.lunch_user)}</div><div style="font-size:14px;color:#6d28d9;margin-top:10px">点击按钮抽取菜品</div>`;
    }
    if(dinnerEl.innerText === '点击下方按钮抽取') {
      dinnerEl.innerHTML = `<div class="manager">今日负责人：${displayName(managers.dinner_user)}</div><div style="font-size:14px;color:#6d28d9;margin-top:10px">点击按钮抽取菜品</div>`;
    }
  }
}

// ========== 菜品相关 ==========
async function batchAddDishes() {
  if(!currentUser) return alert('请先登录');
  const text = document.getElementById('batchInput').value.trim();
  if(!text) return alert('请输入菜品内容');
  
  const lines = text.split('\n').filter(line => line.trim());
  const dishes = [];
  
  for(const line of lines) {
    const parts = line.split(',').map(s => s.trim());
    const name = parts[0];
    const price = parseFloat(parts[1]);
    
    if(!name || isNaN(price)) {
      alert(`格式错误，跳过该行：${line}\n正确格式：菜名,价格`);
      continue;
    }
    dishes.push({ name, price });
  }
  
  if(dishes.length === 0) return;
  
  const { error } = await supabase.from('dishes').insert(dishes);
  if(error) return alert('提交失败：' + error.message);
  
  document.getElementById('batchInput').value = '';
  alert(`成功添加 ${dishes.length} 道菜`);
  loadDishes();
}

async function loadDishes() {
  const minPrice = parseFloat(document.getElementById('minPrice').value);
  const maxPrice = parseFloat(document.getElementById('maxPrice').value);
  
  let query = supabase.from('dishes').select('*').order('votes', { ascending: false });
  
  if(!isNaN(minPrice)) query = query.gte('price', minPrice);
  if(!isNaN(maxPrice)) query = query.lte('price', maxPrice);
  
  const { data: dishes, error } = await query;
  if(error) return;

  let votedIds = [];
  if(currentUser) {
    const { data: votes } = await supabase
      .from('votes')
      .select('dish_id')
      .eq('user_id', currentUser.id);
    votedIds = votes.map(v => v.dish_id);
  }

  const html = dishes.map(d => {
    const hasVoted = votedIds.includes(d.id);
    const delBtn = isAdmin 
      ? `<button class="btn-danger del-btn" onclick="deleteDish(${d.id})">删除</button>` 
      : '';
    return `
    <div class="dish-item">
      <div class="dish-info">
        <span class="dish-name">${d.name}</span>
        <span class="dish-price">¥${d.price}</span>
      </div>
      <div>
        <span class="vote-count">${d.votes} 票</span>
        <button class="btn-primary" onclick="vote(${d.id})" ${hasVoted || !currentUser ? 'disabled' : ''}>
          ${!currentUser ? '登录投票' : hasVoted ? '已投票' : '投票'}
        </button>
        ${delBtn}
      </div>
    </div>
    `;
  }).join('');
  document.getElementById('dishList').innerHTML = html || '<p style="color:#94a3b8;text-align:center;padding:20px">暂无符合条件的菜品</p>';
}

async function vote(id) {
  if(!currentUser) return alert('请先登录');
  const { error } = await supabase
    .from('votes')
    .insert({ user_id: currentUser.id, dish_id: id });
  
  if(error) {
    if(error.code === '23505') return alert('你已经投过这道菜了');
    return alert('投票失败：' + error.message);
  }
  loadDishes();
}

async function deleteDish(id) {
  if(!confirm('确定删除这道菜吗？')) return;
  await supabase.from('dishes').delete().eq('id', id);
  loadDishes();
}

// ========== 周菜单相关 ==========
async function generateWeekly() {
  if(!isAdmin) return alert('仅管理员可操作');
  if(!confirm('确定重新生成本周菜单吗？会清空本周抽取记录。')) return;
  
  await supabase.from('weekly_menu').delete().eq('week_num', currentWeek);
  
  const { data } = await supabase
    .from('dishes')
    .select('id')
    .order('votes', { ascending: false })
    .limit(20);
  
  if(!data || data.length === 0) return alert('菜品不足');
  
  const inserts = data.map(d => ({ dish_id: d.id, week_num: currentWeek }));
  await supabase.from('weekly_menu').insert(inserts);
  alert('本周菜单已生成，共 ' + data.length + ' 道菜');
  loadWeekly();
  document.getElementById('lunchResult').innerHTML = '点击下方按钮抽取';
  document.getElementById('dinnerResult').innerHTML = '点击下方按钮抽取';
  loadTodayManagers();
}

async function loadWeekly(week = currentWeek) {
  const { data, error } = await supabase
    .from('weekly_menu')
    .select(`
      id, is_picked, meal_type,
      dishes (name, price, votes)
    `)
    .eq('week_num', week)
    .order('is_picked', { ascending: true });
  
  if(error) return;
  const html = data.map((item, i) => {
    const mealTag = item.is_picked 
      ? `<span class="meal-tag">${item.meal_type === 'lunch' ? '午餐' : '晚餐'}</span>`
      : '';
    return `
    <div class="dish-item ${item.is_picked ? 'picked' : ''}">
      <div class="dish-info">
        <span class="rank-num rank-${i+1}">${i+1}</span>
        ${mealTag}
        <span class="dish-name">${item.dishes.name}</span>
        <span class="dish-price">¥${item.dishes.price}</span>
      </div>
      <span>${item.is_picked ? '已抽取' : item.dishes.votes + ' 票'}</span>
    </div>
  `;
  }).join('');
  document.getElementById('weeklyList').innerHTML = html || '<p style="color:#94a3b8;text-align:center;padding:20px">请管理员先生成本周菜单</p>';
}

// ========== 抽取相关 ==========
async function randomPick(mealType) {
  if(!isAdmin) return alert('仅管理员可抽取');
  const mealName = mealType === 'lunch' ? '午餐' : '晚餐';

  // 1. 获取今日固定负责人
  const managers = await getTodayManagers();
  if(!managers) return alert('用户不足，无法分配负责人');
  const manager = mealType === 'lunch' ? managers.lunch_user : managers.dinner_user;

  // 2. 随机选菜
  const { data: dishes, error: dishError } = await supabase
    .from('weekly_menu')
    .select('id, dishes(name, price)')
    .eq('week_num', currentWeek)
    .eq('is_picked', false);
  
  if(dishError) return;
  if(!dishes || dishes.length === 0) {
    document.getElementById(mealType + 'Result').innerHTML = 
      `<div class="manager">负责人：${displayName(manager)}</div>
       <div class="dish-name">本周菜品已全部抽完！</div>`;
    return;
  }
  
  const pick = dishes[Math.floor(Math.random() * dishes.length)];
  
  // 3. 保存结果
  const { error: updateError } = await supabase
    .from('weekly_menu')
    .update({ 
      is_picked: true, 
      meal_type: mealType,
      picked_by: manager.id,
      picked_at: new Date().toISOString() 
    })
    .eq('id', pick.id);
  
  if(updateError) return alert('抽取失败：' + updateError.message);
  
  // 4. 显示结果
  document.getElementById(mealType + 'Result').innerHTML = 
    `<div class="manager">今日负责人：${displayName(manager)}</div>
     <div class="dish-name">${pick.dishes.name}</div>
     <div style="font-size:16px;color:#6d28d9;font-weight:500">¥${pick.dishes.price}</div>`;
  
  loadPicked();
  loadWeekly();
}

async function loadPicked() {
  const { data } = await supabase
    .from('weekly_menu')
    .select('dishes(name, price), meal_type, picked_at, user:profiles!picked_by(nickname, email)')
    .eq('week_num', currentWeek)
    .eq('is_picked', true)
    .order('picked_at', { ascending: false });
  
  if(!data) return;
  const html = data.map(item => {
    const mealName = item.meal_type === 'lunch' ? '午餐' : '晚餐';
    return `
    <div class="dish-item">
      <div class="dish-info">
        <span class="meal-tag">${mealName}</span>
        <span class="dish-name">${item.dishes.name}</span>
        <span class="dish-price">¥${item.dishes.price}</span>
      </div>
      <span style="color:#64748b;font-size:12px">负责人：${displayName(item.user)}</span>
    </div>
    `;
  }).join('');
  document.getElementById('pickedList').innerHTML = html || '<p style="color:#94a3b8;text-align:center;padding:20px">还未抽取任何菜品</p>';
}

// ========== 管理员功能 ==========
async function resetWeeklyPicks() {
  if(!isAdmin) return;
  if(!confirm('确定重置本周所有抽取记录吗？所有菜品恢复为未抽取状态。')) return;
  await supabase
    .from('weekly_menu')
    .update({ 
      is_picked: false, 
      meal_type: null, 
      picked_by: null, 
      picked_at: null 
    })
    .eq('week_num', currentWeek);
  
  alert('已重置');
  loadWeekly();
  loadPicked();
  document.getElementById('lunchResult').innerHTML = '点击下方按钮抽取';
  document.getElementById('dinnerResult').innerHTML = '点击下方按钮抽取';
  loadTodayManagers();
}

async function clearAllVotes() {
  if(!isAdmin) return;
  if(!confirm('确定清空所有投票数据吗？此操作不可恢复！')) return;
  if(!confirm('再次确认：所有菜品票数归零，所有人的投票记录清空？')) return;
  
  await supabase.from('votes').delete().gte('id', 0);
  await supabase.from('dishes').update({ votes: 0 }).gte('id', 0);
  alert('已清空所有投票');
  loadDishes();
}

// ========== 历史记录 ==========
async function loadHistoryWeeks() {
  const { data } = await supabase
    .from('weekly_menu')
    .select('week_num')
    .order('week_num', { ascending: false });
  
  if(!data) return;
  const weeks = [...new Set(data.map(item => item.week_num))];
  
  const html = weeks.map(w => 
    `<span class="history-week" onclick="viewHistoryWeek(${w})">第 ${w} 周</span>`
  ).join('');
  document.getElementById('historyWeeks').innerHTML = html || '<p style="color:#94a3b8">暂无历史记录</p>';
}

async function viewHistoryWeek(week) {
  document.querySelectorAll('.history-week').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  
  const { data } = await supabase
    .from('weekly_menu')
    .select(`
      is_picked, picked_at, meal_type,
      dishes (name, price, votes)
    `)
    .eq('week_num', week)
    .order('is_picked', { ascending: true });
  
  if(!data) return;
  
  const pickedCount = data.filter(i => i.is_picked).length;
  const html = `
    <p style="margin-bottom:12px;color:#64748b;font-size:14px">共 ${data.length} 道菜，已抽取 ${pickedCount} 道</p>
    ${data.map((item, i) => {
      const mealTag = item.is_picked 
        ? `<span class="meal-tag">${item.meal_type === 'lunch' ? '午餐' : '晚餐'}</span>`
        : '';
      return `
    <div class="dish-item ${item.is_picked ? 'picked' : ''}">
      <div class="dish-info">
        <span class="rank-num rank-${i+1}">${i+1}</span>
        ${mealTag}
        <span class="dish-name">${item.dishes.name}</span>
        <span class="dish-price">¥${item.dishes.price}</span>
      </div>
      <span>${item.is_picked ? '已抽取' : item.dishes.votes + ' 票'}</span>
    </div>
    `;
    }).join('')}
  `;
  document.getElementById('historyDetail').innerHTML = html;
}

checkAuth();
