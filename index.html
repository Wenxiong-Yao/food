<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f8f6ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>美食圈</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg-primary: #f8f6ff;
    --card-bg: rgba(255, 255, 255, 0.72);
    --card-border: rgba(255, 255, 255, 0.85);
    --card-shadow: 0 8px 28px rgba(139, 124, 255, 0.08);
    --primary: #8b7cff;
    --primary-light: #c4baff;
    --text-1: #333057;
    --text-2: #6b6891;
    --text-3: #a8a5c7;
    --divider: rgba(139, 124, 255, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg-primary);
    color: var(--text-1);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    z-index: 0;
    pointer-events: none;
  }
  body::before {
    width: 320px; height: 320px;
    background: rgba(139, 124, 255, 0.18);
    top: -80px; right: -60px;
  }
  body::after {
    width: 280px; height: 280px;
    background: rgba(167, 139, 250, 0.12);
    bottom: 100px; left: -80px;
  }

  .login-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 380px;
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 40px 32px;
    box-shadow: var(--card-shadow);
    text-align: center;
  }
  .login-card h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 24px;
    color: var(--text-1);
  }
  .input {
    width: 100%;
    padding: 14px 16px;
    margin-bottom: 14px;
    border: 1px solid var(--divider);
    border-radius: 14px;
    font-size: 14px;
    font-family: inherit;
    background: rgba(255, 255, 255, 0.6);
    color: var(--text-1);
    outline: none;
    transition: all 0.2s ease;
  }
  .input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(139, 124, 255, 0.1);
    background: #fff;
  }
  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    margin-bottom: 10px;
    transition: all 0.2s ease;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary-light), var(--primary));
    color: white;
    box-shadow: 0 4px 12px rgba(139, 124, 255, 0.3);
  }
  .btn-ghost {
    background: rgba(255, 255, 255, 0.6);
    color: var(--text-2);
    border: 1px solid var(--card-border);
  }
  .msg {
    font-size: 13px;
    color: var(--text-3);
    margin-top: 12px;
    min-height: 18px;
  }
  .msg.error { color: #ef4444; }
  .msg.success { color: #10b981; }
</style>
</head>
<body>
<div class="login-card">
  <h2>登录 / 注册</h2>
  <input id="email" class="input" placeholder="邮箱地址">
  <input id="pass" class="input" type="password" placeholder="密码（至少6位）">
  <button class="btn btn-primary" onclick="login()">登录</button>
  <button class="btn btn-ghost" onclick="register()">注册新账号</button>
  <p class="msg" id="msg"></p>
</div>

<script>
// ========== 替换成你自己的配置 ==========
const SUPABASE_URL = "https://syzkwpcepvmchjugoemd.supabase.co/rest/v1";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5emt3cGNlcHZtY2hqdWdvZW1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyODA3NzksImV4cCI6MjA5ODg1Njc3OX0.Hrdrf4V6FFOzwsbP_W_MDc3mfjP2k4BJuice2GL3Lqo";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
// =======================================

function showMsg(text, type = '') {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

async function register() {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('pass').value;
  
  if (!email) return showMsg('请输入邮箱', 'error');
  if (pass.length < 6) return showMsg('密码至少6位', 'error');
  
  showMsg('注册中...');
  
  const { error } = await supabase.auth.signUp({ email, password: pass });
  if (error) return showMsg('注册失败：' + error.message, 'error');
  
  showMsg('注册成功，正在登录...', 'success');
  setTimeout(() => location.reload(), 1200);
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('pass').value;
  
  if (!email || !pass) return showMsg('请填写邮箱和密码', 'error');
  
  showMsg('登录中...');
  
  const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
  if (error) return showMsg('登录失败：' + error.message, 'error');
  
  showMsg('登录成功！', 'success');
  // 登录成功后可以在这里跳转主页面
  // location.href = 'main.html';
}
</script>
</body>
</html>
