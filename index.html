<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美食圈</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f3ff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
  }
  .login-card {
    background: white;
    padding: 40px 36px;
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(139, 124, 255, 0.12);
    width: 360px;
    text-align: center;
  }
  h2 { margin: 0 0 24px; color: #333057; }
  input {
    width: 100%;
    padding: 14px 16px;
    margin-bottom: 14px;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    font-size: 14px;
    box-sizing: border-box;
    outline: none;
  }
  input:focus { border-color: #8b7cff; }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    cursor: pointer;
    margin-bottom: 10px;
  }
  .btn-primary {
    background: linear-gradient(135deg, #8b7cff, #a78bfa);
    color: white;
  }
  .btn-ghost {
    background: #f1f5f9;
    color: #64748b;
  }
  .tip { font-size: 12px; color: #94a3b8; margin-top: 10px; }
</style>
</head>
<body>
<div class="login-card">
  <h2>登录 / 注册</h2>
  <input id="email" placeholder="邮箱地址">
  <input id="pass" type="password" placeholder="密码（至少6位）">
  <button class="btn-primary" onclick="login()">登录</button>
  <button class="btn-ghost" onclick="register()">注册新账号</button>
  <p class="tip" id="msg"></p>
</div>

<script>
// ====== 替换成你自己的配置 ======
const SUPABASE_URL = "https://syzkwpcepvmchjugoemd.supabase.co/rest/v1";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5emt3cGNlcHZtY2hqdWdvZW1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyODA3NzksImV4cCI6MjA5ODg1Njc3OX0.Hrdrf4V6FFOzwsbP_W_MDc3mfjP2k4BJuice2GL3Lqo";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
// ===============================

function showMsg(text) {
  document.getElementById('msg').textContent = text;
}

async function register() {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('pass').value;
  if (!email || pass.length < 6) return showMsg('密码至少6位');
  
  const { error } = await supabase.auth.signUp({ email, password: pass });
  if (error) return showMsg('注册失败：' + error.message);
  showMsg('注册成功！正在登录...');
  setTimeout(() => location.reload(), 1000);
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('pass').value;
  if (!email || !pass) return showMsg('请填写邮箱和密码');
  
  const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
  if (error) return showMsg('登录失败：' + error.message);
  showMsg('登录成功！');
  // 登录成功后可以跳转到主页面
  // location.href = 'main.html';
}
</script>
</body>
</html>
